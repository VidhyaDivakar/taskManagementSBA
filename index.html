<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>
    <H1>Task Management</H1>
    <p id="date"></p>

    <input id="taskName" type="text" placeholder="Enter a task">
    <input id="category" type="text" placeholder="Enter the category">
    <input id="deadline" type="date" placeholder="Enter the deadline">


    <select id="status" type="text" placeholder="Enter the status">
        <option value="Not Assigned">Not Assigned</option>
        <option value="Assigned">Assigned</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
        <option value="Overdue">Overdue</option>
    </select>

    <button id="btnAddtask">Add Task</button>
    <h2 class="listHead">Task List</h2>
    <div class=filter>
        <label for="filterStatus">Filter by task:</label>
        <select id="filterStatus">
            <option value="All">All</option>
            <option value="Not Assigned">Not Assigned</option>
            <option value="Not Assigned">Not Assigned</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Overdue">Overdue</option>
        </select>
    </div>

    <ul id="taskArray"></ul>
    <script>
        const d = new Date();
        document.getElementById("date").innerHTML = d;
    </script>

</body>

</html>
